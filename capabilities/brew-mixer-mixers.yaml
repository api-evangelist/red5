naftiko: 1.0.0-alpha2
info:
  label: Red5 Pro Brew Mixer API — Mixers
  description: 'Red5 Pro Brew Mixer API — Mixers. 4 operations. Lead operation: List Active Mixers. Self-contained Naftiko
    capability covering one Red5 business surface.'
  tags:
  - Red5
  - Mixers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RED5_API_KEY: RED5_API_KEY
capability:
  consumes:
  - type: http
    namespace: brew-mixer-mixers
    baseUri: http://{host}:5080
    description: Red5 Pro Brew Mixer API — Mixers business capability. Self-contained, no shared references.
    resources:
    - name: brewmixer-2.0-mixers
      path: /brewmixer/2.0/mixers
      operations:
      - name: listmixers
        method: GET
        description: List Active Mixers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmixer
        method: POST
        description: Create a Mixer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: brewmixer-2.0-mixers-mixerId
      path: /brewmixer/2.0/mixers/{mixerId}
      operations:
      - name: getmixer
        method: GET
        description: Get Mixer Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletemixer
        method: DELETE
        description: Delete a Mixer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: accessToken
      value: '{{env.RED5_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: brew-mixer-mixers-rest
    port: 8080
    description: REST adapter for Red5 Pro Brew Mixer API — Mixers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/brewmixer/2-0/mixers
      name: brewmixer-2-0-mixers
      description: REST surface for brewmixer-2.0-mixers.
      operations:
      - method: GET
        name: listmixers
        description: List Active Mixers
        call: brew-mixer-mixers.listmixers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmixer
        description: Create a Mixer
        call: brew-mixer-mixers.createmixer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/brewmixer/2-0/mixers/{mixerid}
      name: brewmixer-2-0-mixers-mixerid
      description: REST surface for brewmixer-2.0-mixers-mixerId.
      operations:
      - method: GET
        name: getmixer
        description: Get Mixer Details
        call: brew-mixer-mixers.getmixer
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletemixer
        description: Delete a Mixer
        call: brew-mixer-mixers.deletemixer
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: brew-mixer-mixers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Red5 Pro Brew Mixer API — Mixers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-active-mixers
      description: List Active Mixers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: brew-mixer-mixers.listmixers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-mixer
      description: Create a Mixer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: brew-mixer-mixers.createmixer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-mixer-details
      description: Get Mixer Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: brew-mixer-mixers.getmixer
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-mixer
      description: Delete a Mixer
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: brew-mixer-mixers.deletemixer
      outputParameters:
      - type: object
        mapping: $.
