naftiko: 1.0.0-alpha2
info:
  label: Red5 Pro Server API — Logs
  description: 'Red5 Pro Server API — Logs. 1 operations. Lead operation: Get Server Logs. Self-contained Naftiko capability
    covering one Red5 business surface.'
  tags:
  - Red5
  - Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RED5_API_KEY: RED5_API_KEY
capability:
  consumes:
  - type: http
    namespace: server-logs
    baseUri: http://{host}:5080/api/v1
    description: Red5 Pro Server API — Logs business capability. Self-contained, no shared references.
    resources:
    - name: logs
      path: /logs
      operations:
      - name: getserverlogs
        method: GET
        description: Get Server Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: level
          in: query
          type: string
          description: Log level filter (INFO, WARN, ERROR, DEBUG)
        - name: limit
          in: query
          type: integer
          description: Maximum number of log entries to return
    authentication:
      type: apikey
      key: accessToken
      value: '{{env.RED5_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: server-logs-rest
    port: 8080
    description: REST adapter for Red5 Pro Server API — Logs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/logs
      name: logs
      description: REST surface for logs.
      operations:
      - method: GET
        name: getserverlogs
        description: Get Server Logs
        call: server-logs.getserverlogs
        with:
          level: rest.level
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Red5 Pro Server API — Logs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-server-logs
      description: Get Server Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-logs.getserverlogs
      with:
        level: tools.level
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
