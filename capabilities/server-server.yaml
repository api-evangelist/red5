naftiko: 1.0.0-alpha2
info:
  label: Red5 Pro Server API — Server
  description: 'Red5 Pro Server API — Server. 2 operations. Lead operation: Get Server Information. Self-contained Naftiko
    capability covering one Red5 business surface.'
  tags:
  - Red5
  - Server
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RED5_API_KEY: RED5_API_KEY
capability:
  consumes:
  - type: http
    namespace: server-server
    baseUri: http://{host}:5080/api/v1
    description: Red5 Pro Server API — Server business capability. Self-contained, no shared references.
    resources:
    - name: server
      path: /server
      operations:
      - name: getserverinfo
        method: GET
        description: Get Server Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: server-ping
      path: /server/ping
      operations:
      - name: pingserver
        method: GET
        description: Ping the Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: accessToken
      value: '{{env.RED5_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: server-server-rest
    port: 8080
    description: REST adapter for Red5 Pro Server API — Server. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/server
      name: server
      description: REST surface for server.
      operations:
      - method: GET
        name: getserverinfo
        description: Get Server Information
        call: server-server.getserverinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/server/ping
      name: server-ping
      description: REST surface for server-ping.
      operations:
      - method: GET
        name: pingserver
        description: Ping the Server
        call: server-server.pingserver
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: server-server-mcp
    port: 9090
    transport: http
    description: MCP adapter for Red5 Pro Server API — Server. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-server-information
      description: Get Server Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-server.getserverinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: ping-server
      description: Ping the Server
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: server-server.pingserver
      outputParameters:
      - type: object
        mapping: $.
