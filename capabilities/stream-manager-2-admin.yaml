naftiko: 1.0.0-alpha2
info:
  label: Red5 Pro Stream Manager 2.0 API — Admin
  description: 'Red5 Pro Stream Manager 2.0 API — Admin. 3 operations. Lead operation: List Node Groups. Self-contained Naftiko
    capability covering one Red5 business surface.'
  tags:
  - Red5
  - Admin
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RED5_API_KEY: RED5_API_KEY
capability:
  consumes:
  - type: http
    namespace: stream-manager-2-admin
    baseUri: https://{streamManagerDomain}/as/v1
    description: Red5 Pro Stream Manager 2.0 API — Admin business capability. Self-contained, no shared references.
    resources:
    - name: admin-nodegroups
      path: /admin/nodegroups
      operations:
      - name: listnodegroups
        method: GET
        description: List Node Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: admin-nodegroups-nodeGroupName-nodes
      path: /admin/nodegroups/{nodeGroupName}/nodes
      operations:
      - name: listnodes
        method: GET
        description: List Nodes in a Node Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: admin-system
      path: /admin/system
      operations:
      - name: getsysteminfo
        method: GET
        description: Get System Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.RED5_API_KEY}}'
  exposes:
  - type: rest
    namespace: stream-manager-2-admin-rest
    port: 8080
    description: REST adapter for Red5 Pro Stream Manager 2.0 API — Admin. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/admin/nodegroups
      name: admin-nodegroups
      description: REST surface for admin-nodegroups.
      operations:
      - method: GET
        name: listnodegroups
        description: List Node Groups
        call: stream-manager-2-admin.listnodegroups
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/nodegroups/{nodegroupname}/nodes
      name: admin-nodegroups-nodegroupname-nodes
      description: REST surface for admin-nodegroups-nodeGroupName-nodes.
      operations:
      - method: GET
        name: listnodes
        description: List Nodes in a Node Group
        call: stream-manager-2-admin.listnodes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/system
      name: admin-system
      description: REST surface for admin-system.
      operations:
      - method: GET
        name: getsysteminfo
        description: Get System Information
        call: stream-manager-2-admin.getsysteminfo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stream-manager-2-admin-mcp
    port: 9090
    transport: http
    description: MCP adapter for Red5 Pro Stream Manager 2.0 API — Admin. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-node-groups
      description: List Node Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stream-manager-2-admin.listnodegroups
      outputParameters:
      - type: object
        mapping: $.
    - name: list-nodes-node-group
      description: List Nodes in a Node Group
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stream-manager-2-admin.listnodes
      outputParameters:
      - type: object
        mapping: $.
    - name: get-system-information
      description: Get System Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stream-manager-2-admin.getsysteminfo
      outputParameters:
      - type: object
        mapping: $.
