meters:
  - name: license_subscription
    description: Annual Red5 Pro license (sized by concurrent streams or node count)
    unit: contract
    aggregation: sum
    dimensions:
      - edition
      - concurrent_streams
      - support_level
principles:
  - name: Visibility
    description: Red5 Pro Stream Manager exposes per-stream and per-node telemetry; combine
      with the underlying cloud bill (AWS / Azure / GCP) to see total cost-of-streaming.
  - name: Allocation
    description: Tag streams and nodes by application/tenant in Stream Manager so the licensed
      capacity and the cloud spend can be attributed to consuming products.
  - name: Optimization
    description: Right-size autoscaling pools, use spot/preemptible instances for non-critical
      edges, and renegotiate Red5 license tier at renewal based on observed peak concurrency.
  - name: Accountability
    description: Streaming platform team owns Red5 license + cluster cost; consuming product
      teams own their concurrency profile.
