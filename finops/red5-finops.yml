description: FOCUS-aligned FinOps shape for Red5 Pro. Two cost surfaces — the Red5 Pro license
  (subscription, contact-sales) and the customer's underlying cloud spend running the media
  server. Public pricing page was unavailable for automated fetch.
sources:
  - https://www.red5.net/red5pro/pricing/
notes: Red5 site returned 403 to automated fetch; meter list reflects the assumed license +
  customer-cloud cost shape, not a fetched billing surface.
