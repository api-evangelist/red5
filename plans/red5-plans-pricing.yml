specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Red5
providerId: red5
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Streaming
  - Real-Time Video
  - Media Server
description: Red5 (Red5 Pro) is a real-time streaming server. Public access to the company's
  pricing page was blocked from automated fetch (403); historically Red5 Pro is licensed via
  contact-sales tiers (Self-Hosted, Cloud / Stream Manager, Enterprise) sized by node count
  and concurrent stream volume, with a free Open Source / community edition (Red5 OSS).
sources:
  - https://www.red5.net/red5pro/pricing/
notes: Red5 pricing page returned 403 from automated fetch; concrete license rates are not
  reconciled. Treat as gated / contact-sales until the page can be re-fetched manually.
plans:
  - id: red5-oss
    name: Red5 Open Source
    type: freemium
    description: Free open-source Red5 media server (Red5 OSS); community-supported, no commercial
      SLA. Distinct from Red5 Pro.
    entries:
      - label: Open source license
        name: oss
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Community support
      - name: Open source license
  - id: red5-pro-contact-sales
    name: Red5 Pro — Contact Sales
    type: enterprise
    description: Red5 Pro commercial editions (Self-Hosted, Stream Manager / Cloud, Enterprise)
      are quoted by Red5 sales; rates depend on node count, concurrent stream volume, and support
      level.
    entries:
      - label: Custom license
        name: custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: WebRTC and RTMP ingest
      - name: Sub-second latency streaming
      - name: Stream Manager autoscaling
      - name: Commercial support
