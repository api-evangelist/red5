specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Red5
providerId: red5
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Streaming
  - Real-Time Video
  - Rate Limiting
description: Red5 Pro is a customer-deployed media server (self-hosted or via Stream Manager
  on the customer's cloud account). Concurrency and throughput are bounded by the customer's
  deployed node count rather than by a Red5-published rate ceiling. The Red5 site was unavailable
  for automated fetch.
sources:
  - https://www.red5.net/red5pro/pricing/
notes: Red5 pricing/docs pages returned 403; no platform-wide rate limit is published. Capacity
  is governed by customer deployment topology and the licensed concurrent-stream count.
responseCodes: {}
limits:
  - name: License-based concurrency
    scope: deployment
    metric: varies
    limit: 'concurrent streams capped by purchased Red5 Pro license tier'
  - name: Self-hosted capacity
    scope: deployment
    metric: varies
    limit: 'bounded by node sizing / autoscaling configuration in Stream Manager'
policies:
  - name: License-Bound Concurrency
    description: The number of concurrent streams supported is governed by the customer's Red5
      Pro license rather than a per-second request limit.
  - name: Customer-Operated Scaling
    description: Stream Manager autoscaling and topology are operated by the customer on their
      own cloud account; Red5 does not enforce a request rate centrally.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
